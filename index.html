      good: ["Webライティング（文字単価1〜10円）", "ブログ運営（広告収入）", "SNS運用代行", "電子書籍出版"],
      bad: ["肉体労働", "データ分析", "トレード"],
      action: "まずはクラウドワークスやランサーズに登録して、3,000字の記事を1本書いてみましょう。最初の1本が一番大事です。",
      scores: {physical:10, freedom:85, income:65, growth:80, creativity:85},
    }
  },
};

// ── Quiz state ──
let currentQ = 0;
let scores = {D:0, F:0, C:0, T:0, E:0, L:0};

function startQuiz() {
  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  gtag('event', 'quiz_start');
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = ((currentQ) / QUESTIONS.length * 100).toFixed(0);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;

  let html = `<div class="question-card">
    <div class="q-number">Q${currentQ + 1}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">`;
  q.options.forEach((opt, i) => {
    html += `<div class="option" onclick="selectOption(${i})">${opt.text}</div>`;
  });
  html += `</div></div>`;
  document.getElementById('question-area').innerHTML = html;
}

function selectOption(i) {
  const q = QUESTIONS[currentQ];
  const s = q.options[i].scores;
  for (const [k, v] of Object.entries(s)) {
    scores[k] = (scores[k] || 0) + v;
  }

  // Visual feedback
  document.querySelectorAll('.option')[i].classList.add('selected');

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 300);
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  // Find top type
  let topType = 'D';
  let topScore = 0;
  for (const [k, v] of Object.entries(scores)) {
    if (v > topScore) { topScore = v; topType = k; }
  }

  // Second type
  let secondType = 'F';
  let secondScore = 0;
  for (const [k, v] of Object.entries(scores)) {
    if (k !== topType && v > secondScore) { secondScore = v; secondType = k; }
  }

  const t = TYPES[topType];
  const t2 = TYPES[secondType];

  gtag('event', 'quiz_complete', {result_type: t.name});

  let html = `<div class="result-screen">
    <span class="badge">診断完了！</span>
    <div class="result-type-icon">${t.icon}</div>
    <div class="result-type-name" style="color:${t.color}">${t.name}</div>
    <div class="result-type-sub">${t.sub}</div>

    <div class="result-summary">
      <h3>あなたの診断結果</h3>
      <p>${t.summary}</p>
    </div>

    <div class="share-box">
      <button class="share-btn line" onclick="shareLINE('${t.name}')">LINEで共有</button>
      <button class="share-btn x" onclick="shareX('${t.name}')">Xで共有</button>
    </div>

    <div class="paywall">
      <h3>🔓 もっと詳しく知りたい？</h3>
      <div class="price">¥300</div>
      <div class="price-sub">PayPay でお支払い</div>
      <p>詳細分析レポートを見る</p>
      <ul>
        <li>あなたの強み・弱みの詳細分析</li>
        <li>おすすめ副業 TOP4 と具体的な始め方</li>
        <li>向いてない副業（避けるべき地雷）</li>
        <li>5項目の適性レーダー</li>
        <li>今日からやるべき最初の1歩</li>
      </ul>
      <a href="https://qr.paypay.ne.jp/p2p01_nvnG6zCMxaaCw596" target="_blank" class="btn-pay" id="btn-pay" onclick="gtag('event','click_pay',{type:'${t.name}'})">PayPay で ¥300 支払う</a>
      <p style="margin-top:12px;font-size:.75rem;color:var(--text3)">支払い後、この画面に戻って下のボタンを押してください</p>
      <button onclick="showPremium('${topType}','${secondType}')" style="margin-top:12px;padding:10px 24px;background:var(--surface2);color:var(--text2);border:1px solid rgba(255,255,255,.1);border-radius:20px;cursor:pointer;font-size:.8rem">支払い済み → 詳細を見る</button>
    </div>

    <div class="premium-result" id="premium-result"></div>
  </div>`;

  document.getElementById('screen-result').innerHTML = html;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function showPremium(mainType, subType) {
  const t = TYPES[mainType];
  const t2 = TYPES[subType];
  const p = t.premium;
  gtag('event', 'view_premium', {type: t.name});

  const scoreLabels = {physical:'体力活用度',freedom:'自由度',income:'収入ポテンシャル',growth:'成長性',creativity:'創造性'};
  const scoreColors = {physical:'#fb923c',freedom:'#60a5fa',income:'#4ade80',growth:'#a78bfa',creativity:'#f472b6'};

  let scoresHtml = '';
  for (const [k, v] of Object.entries(p.scores)) {
    scoresHtml += `<div class="match-bar">
      <span class="label">${scoreLabels[k]}</span>
      <div class="bar"><div class="bar-fill" style="width:${v}%;background:${scoreColors[k]}"></div></div>
      <span style="font-size:.8rem;color:var(--text2);min-width:36px;text-align:right">${v}%</span>
    </div>`;
  }

  let html = `
    <div class="detail-section">
      <h3>${t.icon} 詳細分析</h3>
      <p>${p.detail}</p>
    </div>

    <div class="detail-section">
      <h3>📊 あなたの適性レーダー</h3>
      ${scoresHtml}
    </div>

    <div class="detail-section">
      <h3>✅ おすすめ副業 TOP${p.good.length}</h3>
      <ul>${p.good.map(g => `<li>${g}</li>`).join('')}</ul>
    </div>

    <div class="detail-section">
      <h3>⚠️ 向いてない副業（避けた方がいい）</h3>
      <ul>${p.bad.map(b => `<li>${b}</li>`).join('')}</ul>
    </div>

    <div class="detail-section">
      <h3>🚀 今日からやるべき最初の1歩</h3>
      <p>${p.action}</p>
      ${p.cta_url ? `<a href="${p.cta_url}" target="_blank" style="display:inline-block;margin-top:12px;padding:12px 28px;background:linear-gradient(135deg,var(--accent),#6246ea);color:#fff;border-radius:30px;text-decoration:none;font-size:.9rem;font-weight:600">${p.cta_text || '詳しく見る'}</a>` : ''}
    </div>

    <div class="detail-section">
      <h3>🤝 サブタイプ: ${t2.icon} ${t2.name}</h3>
      <p>${t2.summary}</p>
    </div>

    <div class="share-box">
      <button class="share-btn line" onclick="shareLINE('${t.name}')">結果をLINEで共有</button>
      <button class="share-btn x" onclick="shareX('${t.name}')">結果をXで共有</button>
    </div>
  `;

  const el = document.getElementById('premium-result');
  el.innerHTML = html;
  el.classList.add('show');
  el.scrollIntoView({behavior: 'smooth'});
}

function shareLINE(type) {
  const text = `副業適性診断やってみた！私は「${type}」だった🎯 あなたもやってみて👇`;
  const url = 'https://richend0913.github.io/shindan/';
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank');
  gtag('event', 'share', {method: 'LINE', type: type});
}

function shareX(type) {
  const text = `副業適性診断やってみた！\n結果は「${type}」🎯\n\nあなたもやってみて👇`;
  const url = 'https://richend0913.github.io/shindan/';
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
  gtag('event', 'share', {method: 'X', type: type});
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--surface:#14142a;--surface2:#1e1e3a;
  --text:#e8e8f0;--text2:#a0a0c0;--text3:#6a6a8a;
  --accent:#7c5cfc;--accent2:#a78bfa;--glow:rgba(124,92,252,.2);
  --pink:#f472b6;--orange:#fb923c;--green:#4ade80;--blue:#60a5fa;--yellow:#fbbf24;
  --radius:16px;
}
body{font-family:'Hiragino Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
.container{max-width:720px;margin:0 auto;padding:20px}

/* Hero */
.hero{text-align:center;padding:60px 20px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(124,92,252,.08) 0%,transparent 60%);animation:cosmicPulse 6s ease-in-out infinite}
@keyframes cosmicPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.hero h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;position:relative}
.hero p{color:var(--text2);font-size:1rem;position:relative}
.badge{display:inline-block;padding:6px 18px;border-radius:20px;font-size:.8rem;background:rgba(124,92,252,.15);color:var(--accent2);border:1px solid rgba(124,92,252,.2);margin-bottom:20px;position:relative}
.stars{font-size:1.4rem;margin-bottom:16px;position:relative}

/* Cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0 40px}
.card{background:var(--surface);border:1px solid rgba(124,92,252,.12);border-radius:var(--radius);padding:32px 24px;text-align:center;cursor:pointer;transition:all .3s;text-decoration:none;color:var(--text);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--pink));opacity:0;transition:opacity .3s}
.card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 32px rgba(124,92,252,.2)}
.card:hover::before{opacity:1}
.card-icon{font-size:3.5rem;margin-bottom:16px;display:block}
.card h2{font-size:1.15rem;font-weight:700;margin-bottom:8px}
.card p{font-size:.85rem;color:var(--text2);margin-bottom:16px;line-height:1.6}
.card-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.72rem;background:rgba(124,92,252,.1);color:var(--accent2);border:1px solid rgba(124,92,252,.15)}
.card-arrow{margin-top:16px;font-size:.85rem;color:var(--accent2);font-weight:600}

/* Features */
.features-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0}
.feat{padding:8px 16px;background:var(--surface);border-radius:20px;font-size:.8rem;color:var(--text2);border:1px solid rgba(255,255,255,.05)}

/* Footer */
.footer{text-align:center;padding:40px 20px;font-size:.75rem;color:var(--text3)}
.footer a{color:var(--accent2);text-decoration:none}
.footer a:hover{text-decoration:underline}

@media(max-width:520px){
  .cards{grid-template-columns:1fr}
  .hero h1{font-size:1.4rem}
}
</style>

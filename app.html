<!DOCTYPE html>
<html lang="ja">

<title>診断を作成｜ShindanMaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#fff;--cream:#faf8f5;--gray50:#f7f5f2;--gray100:#eeeae5;
  --gray200:#ddd8d0;--gray300:#b8b0a5;--gray400:#8a8278;--gray500:#6b635a;
  --gray600:#4a443d;--gray700:#2d2a26;--gray800:#1a1816;
  --primary:#6c5ce7;--primary-light:#a29bfe;--primary-dark:#5a4bd1;
  --primary-bg:rgba(108,92,231,.06);--primary-border:rgba(108,92,231,.15);
  --accent:#fd79a8;--success:#00b894;--danger:#e17055;--warning:#fdcb6e;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);--shadow:0 2px 8px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP','Inter',sans-serif;background:var(--cream);color:var(--gray700);line-height:1.7;min-height:100vh}

/* Header */
.header{background:var(--white);border-bottom:1px solid var(--gray100);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-logo{font-weight:700;font-size:1.05rem;color:var(--gray800);text-decoration:none}
.header-logo span{color:var(--primary)}
.header-actions{display:flex;gap:8px}
.header-btn{padding:7px 16px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.header-btn-ghost{background:transparent;color:var(--gray500)}
.header-btn-ghost:hover{background:var(--gray50)}
.header-btn-primary{background:var(--primary);color:#fff}
.header-btn-primary:hover{background:var(--primary-dark)}

/* Layout */
.layout{max-width:760px;margin:0 auto;padding:24px 16px 80px}

/* Progress */
.progress-bar{display:flex;gap:4px;margin-bottom:32px;background:var(--white);padding:16px 20px;border-radius:var(--radius);border:1px solid var(--gray100)}
.progress-step{flex:1;text-align:center;position:relative;cursor:pointer}
.progress-step .num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;margin:0 auto 6px;border:2px solid var(--gray200);color:var(--gray300);background:var(--white);transition:all .3s}
.progress-step .label{font-size:.72rem;color:var(--gray400);font-weight:500;transition:color .3s}
.progress-step.active .num{border-color:var(--primary);background:var(--primary);color:#fff}
.progress-step.active .label{color:var(--primary);font-weight:600}
.progress-step.done .num{border-color:var(--success);background:var(--success);color:#fff}
.progress-step.done .label{color:var(--success)}
.progress-connector{position:absolute;top:16px;left:calc(50% + 20px);right:calc(-50% + 20px);height:2px;background:var(--gray200);z-index:0}
.progress-step.done .progress-connector{background:var(--success)}

/* Card */
.card{background:var(--white);border:1px solid var(--gray100);border-radius:var(--radius-lg);padding:28px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.card-title{font-size:1.1rem;font-weight:700;color:var(--gray800);margin-bottom:4px}
.card-desc{font-size:.84rem;color:var(--gray400);margin-bottom:20px}

/* Form */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:var(--gray600);margin-bottom:6px}
.form-label .required{color:var(--danger);margin-left:2px}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--gray200);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;color:var(--gray700);background:var(--white);transition:border-color .2s,box-shadow .2s;outline:none}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.form-input.error,.form-textarea.error{border-color:var(--danger)}
.form-textarea{resize:vertical;min-height:70px}
.form-hint{font-size:.75rem;color:var(--gray400);margin-top:4px}
.form-error{font-size:.75rem;color:var(--danger);margin-top:4px;display:none}

/* Color picker */
.color-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.color-option{padding:12px;border:2px solid var(--gray100);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;text-align:center}
.color-option:hover{border-color:var(--gray300)}
.color-option.selected{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.color-swatch{height:32px;border-radius:6px;margin-bottom:6px}
.color-name{font-size:.75rem;font-weight:600;color:var(--gray500)}

/* Style picker */
.style-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.style-option{padding:14px;border:2px solid var(--gray100);border-radius:var(--radius-sm);cursor:pointer;text-align:center;transition:all .2s}
.style-option:hover{border-color:var(--gray300)}
.style-option.selected{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.style-label{font-size:.82rem;font-weight:600;color:var(--gray600)}

/* Result type cards */
.type-card{background:var(--gray50);border:1px solid var(--gray100);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative}
.type-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.type-num{font-size:.78rem;font-weight:700;color:var(--primary)}
.type-remove{background:none;border:none;font-size:.82rem;color:var(--gray400);cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s}
.type-remove:hover{color:var(--danger);background:rgba(225,112,85,.08)}

/* Question cards */
.q-card{background:var(--gray50);border:1px solid var(--gray100);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.q-num{font-size:.78rem;font-weight:700;color:var(--primary)}
.q-remove{background:none;border:none;font-size:.82rem;color:var(--gray400);cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s}
.q-remove:hover{color:var(--danger);background:rgba(225,112,85,.08)}
.choice-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.choice-row .form-input{flex:1}
.choice-row .form-select{width:160px;flex-shrink:0}
.choice-label{font-size:.75rem;font-weight:600;color:var(--gray400);width:20px;text-align:center;flex-shrink:0}

/* Add button */
.btn-add{width:100%;padding:12px;background:var(--white);border:2px dashed var(--gray200);border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;color:var(--gray400);cursor:pointer;transition:all .2s}
.btn-add:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg)}

/* Nav buttons */
.step-nav{display:flex;gap:12px;margin-top:24px}
.btn-prev,.btn-next{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-prev{background:var(--white);color:var(--gray600);border:1.5px solid var(--gray200)}
.btn-prev:hover{border-color:var(--primary);color:var(--primary)}
.btn-next{background:var(--primary);color:#fff}
.btn-next:hover{background:var(--primary-dark)}
.btn-next:disabled{background:var(--gray200);cursor:not-allowed}

/* Step 4 publish */
.publish-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.publish-btn{padding:16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.publish-icon{font-size:1.5rem}
.publish-btn-preview{background:var(--gray50);color:var(--gray600);border:1.5px solid var(--gray200)}
.publish-btn-preview:hover{border-color:var(--primary);color:var(--primary)}
.publish-btn-download{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 16px rgba(108,92,231,.25)}
.publish-btn-download:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,92,231,.35)}
.publish-btn-publish{background:var(--success);color:#fff;grid-column:span 2}
.publish-btn-publish:hover{opacity:.9}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gray800);color:#fff;padding:12px 24px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;z-index:999;transition:transform .3s ease;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* Step panels */
.step-panel{display:none}
.step-panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Summary */
.summary-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray100);font-size:.88rem}
.summary-label{color:var(--gray400)}
.summary-value{font-weight:600;color:var(--gray700)}

@media(max-width:600px){
  .choice-row{flex-wrap:wrap}
  .choice-row .form-select{width:100%}
  .publish-actions{grid-template-columns:1fr}
  .publish-btn-publish{grid-column:span 1}
  .color-options{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <a href="./" class="header-logo">Shindan<span>Maker</span></a>
  <div class="header-actions">
    <button class="header-btn header-btn-ghost" onclick="location.href='./'">ホームに戻る</button>
  </div>
</div>

<div class="layout">
  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-step active" onclick="goToStep(0)">
      <div class="num">1</div>
      <div class="label">基本設定</div>
    </div>
    <div class="progress-step" onclick="goToStep(1)">
      <div class="num">2</div>
      <div class="label">結果タイプ</div>
    </div>
    <div class="progress-step" onclick="goToStep(2)">
      <div class="num">3</div>
      <div class="label">質問設定</div>
    </div>
    <div class="progress-step" onclick="goToStep(3)">
      <div class="num">4</div>
      <div class="label">プレビュー</div>
    </div>
  </div>

  <!-- Step 1: Basic Settings -->
  <div class="step-panel active" id="step0">
    <div class="card">
      <div class="card-title">基本設定</div>
      <div class="card-desc">診断のタイトルとデザインを設定しましょう。</div>
      <div class="form-group">
        <label class="form-label">診断タイトル<span class="required">*</span></label>
        <input class="form-input" id="title" placeholder="例：あなたの前世診断" maxlength="40">
        <div class="form-hint">40文字以内</div>
      </div>
      <div class="form-group">
        <label class="form-label">診断の説明</label>
        <textarea class="form-textarea" id="description" placeholder="例：10の質問であなたの前世を診断します" maxlength="120" rows="2"></textarea>
        <div class="form-hint">120文字以内</div>
      </div>
      <div class="form-group">
        <label class="form-label">カラーテーマ</label>
        <div class="color-options" id="colorOptions">
          <div class="color-option selected" data-theme="pink" onclick="selectColor(this)">
            <div class="color-swatch" style="background:linear-gradient(135deg,#d4a5b8,#c48ba0)"></div>
            <div class="color-name">ピンク系</div>
          </div>
          <div class="color-option" data-theme="purple" onclick="selectColor(this)">
            <div class="color-swatch" style="background:linear-gradient(135deg,#a29bfe,#6c5ce7)"></div>
            <div class="color-name">パープル系</div>
          </div>
          <div class="color-option" data-theme="blue" onclick="selectColor(this)">
            <div class="color-swatch" style="background:linear-gradient(135deg,#74b9ff,#0984e3)"></div>
            <div class="color-name">ブルー系</div>
          </div>
          <div class="color-option" data-theme="green" onclick="selectColor(this)">
            <div class="color-swatch" style="background:linear-gradient(135deg,#55efc4,#00b894)"></div>
            <div class="color-name">グリーン系</div>
          </div>
          <div class="color-option" data-theme="orange" onclick="selectColor(this)">
            <div class="color-swatch" style="background:linear-gradient(135deg,#fdcb6e,#e17055)"></div>
            <div class="color-name">オレンジ系</div>
          </div>
          <div class="color-option" data-theme="mono" onclick="selectColor(this)">
            <div class="color-swatch" style="background:linear-gradient(135deg,#b2bec3,#636e72)"></div>
            <div class="color-name">モノクロ</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">背景スタイル</label>
        <div class="style-options">
          <div class="style-option selected" data-style="light" onclick="selectStyle(this)">
            <div style="font-size:1.2rem;margin-bottom:4px">&#x2600;&#xFE0F;</div>
            <div class="style-label">ライト</div>
          </div>
          <div class="style-option" data-style="dark" onclick="selectStyle(this)">
            <div style="font-size:1.2rem;margin-bottom:4px">&#x1F319;</div>
            <div class="style-label">ダーク</div>
          </div>
        </div>
      </div>
    </div>
    <div class="step-nav">
      <div style="flex:1"></div>
      <button class="btn-next" onclick="nextStep()">次へ &rarr;</button>
    </div>
  </div>

  <!-- Step 2: Result Types -->
  <div class="step-panel" id="step1">
    <div class="card">
      <div class="card-title">結果タイプ設定</div>
      <div class="card-desc">診断結果のタイプを2~8つ設定してください。</div>
      <div id="typesContainer"></div>
      <button class="btn-add" id="addTypeBtn" onclick="addType()">+ タイプを追加</button>
    </div>
    <div class="step-nav">
      <button class="btn-prev" onclick="prevStep()">&larr; 戻る</button>
      <button class="btn-next" onclick="nextStep()">次へ &rarr;</button>
    </div>
  </div>

  <!-- Step 3: Questions -->
  <div class="step-panel" id="step2">
    <div class="card">
      <div class="card-title">質問設定</div>
      <div class="card-desc">最大10問まで設定できます。各選択肢で、どの結果タイプにポイントが入るか設定してください。</div>
      <div id="questionsContainer"></div>
      <button class="btn-add" id="addQBtn" onclick="addQuestion()">+ 質問を追加</button>
    </div>
    <div class="step-nav">
      <button class="btn-prev" onclick="prevStep()">&larr; 戻る</button>
      <button class="btn-next" onclick="nextStep()">次へ &rarr;</button>
    </div>
  </div>

  <!-- Step 4: Preview & Publish -->
  <div class="step-panel" id="step3">
    <div class="card">
      <div class="card-title">プレビュー & 公開</div>
      <div class="card-desc">設定内容を確認して、診断を公開しましょう。</div>
      <div id="summaryArea"></div>
    </div>
    <div class="card">
      <div class="card-title">アクション</div>
      <div class="publish-actions">
        <button class="publish-btn publish-btn-preview" onclick="doPreview()">
          <span class="publish-icon">&#x1F441;</span>
          プレビュー
        </button>
        <button class="publish-btn publish-btn-download" onclick="doDownload()">
          <span class="publish-icon">&#x1F4E5;</span>
          HTMLダウンロード
        </button>
        <button class="publish-btn publish-btn-publish" onclick="doPublish()">
          <span class="publish-icon">&#x1F680;</span>
          公開する (ローカル保存)
        </button>
      </div>
    </div>
    <div class="step-nav">
      <button class="btn-prev" onclick="prevStep()">&larr; 戻る</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
let currentStep = 0;
let data = {
  title: '',
  description: '',
  theme: 'pink',
  bgStyle: 'light',
  types: [],
  questions: []
};

const THEMES = {
  pink:   { primary:'#c48ba0', light:'#d4a5b8', bg:'#faf7f4', bgDark:'#2a1a22', text:'#5a4a54', textDark:'#f0e0e8' },
  purple: { primary:'#6c5ce7', light:'#a29bfe', bg:'#f5f3ff', bgDark:'#1a1530', text:'#4a4060', textDark:'#e0d8f0' },
  blue:   { primary:'#0984e3', light:'#74b9ff', bg:'#f0f7ff', bgDark:'#0a1628', text:'#2d4a6a', textDark:'#d0e4f8' },
  green:  { primary:'#00b894', light:'#55efc4', bg:'#f0faf5', bgDark:'#0a2018', text:'#2a5a44', textDark:'#d0f0e0' },
  orange: { primary:'#e17055', light:'#fdcb6e', bg:'#fff8f0', bgDark:'#2a1810', text:'#5a3a2a', textDark:'#f8e0d0' },
  mono:   { primary:'#636e72', light:'#b2bec3', bg:'#f5f5f5', bgDark:'#1a1a1a', text:'#4a4a4a', textDark:'#d0d0d0' }
};

// ===== Init =====
function init() {
  addType(); addType();
  addQuestion();
}

// ===== Step Navigation =====
function goToStep(n) {
  if (n > currentStep + 1) return;
  if (n <= currentStep || validateCurrentStep()) {
    saveCurrentStep();
    currentStep = n;
    renderStep();
  }
}
function nextStep() {
  if (!validateCurrentStep()) return;
  saveCurrentStep();
  if (currentStep < 3) { currentStep++; renderStep(); }
}
function prevStep() {
  saveCurrentStep();
  if (currentStep > 0) { currentStep--; renderStep(); }
}

function renderStep() {
  document.querySelectorAll('.step-panel').forEach((p,i) => {
    p.classList.toggle('active', i === currentStep);
  });
  document.querySelectorAll('.progress-step').forEach((s,i) => {
    s.classList.remove('active','done');
    if (i < currentStep) s.classList.add('done');
    if (i === currentStep) s.classList.add('active');
  });
  if (currentStep === 2) refreshQuestionDropdowns();
  if (currentStep === 3) renderSummary();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== Validation =====
function validateCurrentStep() {
  if (currentStep === 0) {
    const t = document.getElementById('title').value.trim();
    if (!t) { showToast('タイトルを入力してください','error'); document.getElementById('title').classList.add('error'); return false; }
    document.getElementById('title').classList.remove('error');
    return true;
  }
  if (currentStep === 1) {
    const cards = document.querySelectorAll('.type-card');
    if (cards.length < 2) { showToast('結果タイプは最低2つ必要です','error'); return false; }
    let ok = true;
    cards.forEach(c => {
      const nm = c.querySelector('.type-name');
      if (!nm.value.trim()) { nm.classList.add('error'); ok = false; }
      else nm.classList.remove('error');
    });
    if (!ok) showToast('タイプ名を入力してください','error');
    return ok;
  }
  if (currentStep === 2) {
    const cards = document.querySelectorAll('.q-card');
    if (cards.length < 1) { showToast('最低1つの質問が必要です','error'); return false; }
    let ok = true;
    cards.forEach(c => {
      const qt = c.querySelector('.q-text');
      if (!qt.value.trim()) { qt.classList.add('error'); ok = false; }
      else qt.classList.remove('error');
      c.querySelectorAll('.choice-text').forEach(ct => {
        if (!ct.value.trim()) { ct.classList.add('error'); ok = false; }
        else ct.classList.remove('error');
      });
    });
    if (!ok) showToast('質問と選択肢を入力してください','error');
    return ok;
  }
  return true;
}

// ===== Save step data =====
function saveCurrentStep() {
  if (currentStep === 0) {
    data.title = document.getElementById('title').value.trim();
    data.description = document.getElementById('description').value.trim();
    const sel = document.querySelector('.color-option.selected');
    if (sel) data.theme = sel.dataset.theme;
    const sty = document.querySelector('.style-option.selected');
    if (sty) data.bgStyle = sty.dataset.style;
  }
  if (currentStep === 1) {
    data.types = [];
    document.querySelectorAll('.type-card').forEach(c => {
      data.types.push({
        name: c.querySelector('.type-name').value.trim(),
        description: c.querySelector('.type-desc').value.trim(),
        tags: c.querySelector('.type-tags').value.trim(),
        image: c.querySelector('.type-img').value.trim()
      });
    });
  }
  if (currentStep === 2) {
    data.questions = [];
    document.querySelectorAll('.q-card').forEach(c => {
      const q = { text: c.querySelector('.q-text').value.trim(), choices: [] };
      c.querySelectorAll('.choice-row').forEach(r => {
        q.choices.push({
          text: r.querySelector('.choice-text').value.trim(),
          typeIndex: parseInt(r.querySelector('.choice-type').value) || 0
        });
      });
      data.questions.push(q);
    });
  }
}

// ===== Color & Style selection =====
function selectColor(el) {
  document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}
function selectStyle(el) {
  document.querySelectorAll('.style-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

// ===== Types =====
function addType() {
  const container = document.getElementById('typesContainer');
  const count = container.querySelectorAll('.type-card').length;
  if (count >= 8) { showToast('最大8タイプまでです','error'); return; }
  const idx = count + 1;
  const div = document.createElement('div');
  div.className = 'type-card';
  div.innerHTML = `
    <div class="type-header">
      <span class="type-num">タイプ ${idx}</span>
      <button class="type-remove" onclick="removeType(this)" ${count < 2 ? 'style="display:none"' : ''}>削除</button>
    </div>
    <div class="form-group">
      <label class="form-label">タイプ名<span class="required">*</span></label>
      <input class="form-input type-name" placeholder="例：古代ローマの将軍" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">説明文</label>
      <textarea class="form-textarea type-desc" placeholder="この結果タイプの説明" rows="2" maxlength="300"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">タグ (カンマ区切り)</label>
      <input class="form-input type-tags" placeholder="例：統率力,戦略,不屈の精神">
    </div>
    <div class="form-group">
      <label class="form-label">画像URL (任意)</label>
      <input class="form-input type-img" placeholder="https://example.com/image.png">
    </div>`;
  container.appendChild(div);
  updateTypeNumbers();
  if (container.querySelectorAll('.type-card').length >= 8) document.getElementById('addTypeBtn').style.display = 'none';
}

function removeType(btn) {
  const container = document.getElementById('typesContainer');
  if (container.querySelectorAll('.type-card').length <= 2) { showToast('最低2タイプ必要です','error'); return; }
  btn.closest('.type-card').remove();
  updateTypeNumbers();
  document.getElementById('addTypeBtn').style.display = '';
}

function updateTypeNumbers() {
  const cards = document.querySelectorAll('.type-card');
  cards.forEach((c,i) => {
    c.querySelector('.type-num').textContent = `タイプ ${i+1}`;
    const rmBtn = c.querySelector('.type-remove');
    rmBtn.style.display = cards.length <= 2 ? 'none' : '';
  });
}

// ===== Questions =====
function addQuestion() {
  const container = document.getElementById('questionsContainer');
  const count = container.querySelectorAll('.q-card').length;
  if (count >= 10) { showToast('最大10問までです','error'); return; }
  const idx = count + 1;
  const div = document.createElement('div');
  div.className = 'q-card';
  div.innerHTML = `
    <div class="q-header">
      <span class="q-num">Q${idx}</span>
      <button class="q-remove" onclick="removeQuestion(this)">削除</button>
    </div>
    <div class="form-group">
      <label class="form-label">質問文<span class="required">*</span></label>
      <input class="form-input q-text" placeholder="例：直感で選んで。心が落ち着く場所は？" maxlength="80">
    </div>
    <div class="form-group">
      <label class="form-label">選択肢 (4つ)</label>
      ${[1,2,3,4].map(n => `
      <div class="choice-row">
        <span class="choice-label">${String.fromCharCode(64+n)}</span>
        <input class="form-input choice-text" placeholder="選択肢${n}">
        <select class="form-select choice-type"><option value="0">タイプ1</option></select>
      </div>`).join('')}
    </div>`;
  container.appendChild(div);
  updateQuestionNumbers();
  refreshQuestionDropdowns();
  if (container.querySelectorAll('.q-card').length >= 10) document.getElementById('addQBtn').style.display = 'none';
}

function removeQuestion(btn) {
  btn.closest('.q-card').remove();
  updateQuestionNumbers();
  document.getElementById('addQBtn').style.display = '';
}

function updateQuestionNumbers() {
  document.querySelectorAll('.q-card').forEach((c,i) => {
    c.querySelector('.q-num').textContent = `Q${i+1}`;
  });
}

function refreshQuestionDropdowns() {
  // Read current type names from step 1 or from data
  let typeNames = [];
  const typeCards = document.querySelectorAll('.type-card .type-name');
  if (typeCards.length > 0) {
    typeCards.forEach((inp,i) => typeNames.push(inp.value.trim() || `タイプ${i+1}`));
  } else {
    data.types.forEach((t,i) => typeNames.push(t.name || `タイプ${i+1}`));
  }
  document.querySelectorAll('.choice-type').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = typeNames.map((n,i) => `<option value="${i}">${n}</option>`).join('');
    if (cur < typeNames.length) sel.value = cur;
  });
}

// ===== Summary =====
function renderSummary() {
  const t = THEMES[data.theme] || THEMES.pink;
  const area = document.getElementById('summaryArea');
  area.innerHTML = `
    <div class="summary-item"><span class="summary-label">タイトル</span><span class="summary-value">${esc(data.title)}</span></div>
    <div class="summary-item"><span class="summary-label">説明</span><span class="summary-value">${esc(data.description) || '-'}</span></div>
    <div class="summary-item"><span class="summary-label">テーマ</span><span class="summary-value"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${t.primary};vertical-align:middle;margin-right:4px"></span>${data.theme}</span></div>
    <div class="summary-item"><span class="summary-label">背景</span><span class="summary-value">${data.bgStyle === 'light' ? 'ライト' : 'ダーク'}</span></div>
    <div class="summary-item"><span class="summary-label">結果タイプ数</span><span class="summary-value">${data.types.length}</span></div>
    <div class="summary-item"><span class="summary-label">質問数</span><span class="summary-value">${data.questions.length}</span></div>
  `;
}

// ===== Preview =====
function doPreview() {
  saveCurrentStep();
  if (!data.title) { showToast('タイトルを入力してください','error'); return; }
  localStorage.setItem('shindan_preview', JSON.stringify(data));
  window.open('play.html?preview=local', '_blank');
}

// ===== Publish =====
function doPublish() {
  saveCurrentStep();
  if (!validateAll()) return;
  const id = Date.now().toString(36);
  localStorage.setItem('shindan_published_' + id, JSON.stringify(data));
  showToast('公開しました! ID: ' + id, 'success');
  const url = location.origin + location.pathname.replace('app.html','play.html') + '?id=' + id;
  setTimeout(() => { prompt('この URLで閲覧できます:', url); }, 500);
}

function validateAll() {
  if (!data.title) { showToast('タイトルが未入力です','error'); return false; }
  if (data.types.length < 2) { showToast('結果タイプが2つ以上必要です','error'); return false; }
  if (data.questions.length < 1) { showToast('質問が1つ以上必要です','error'); return false; }
  for (const t of data.types) { if (!t.name) { showToast('タイプ名が未入力のものがあります','error'); return false; } }
  for (const q of data.questions) {
    if (!q.text) { showToast('質問文が未入力のものがあります','error'); return false; }
    for (const c of q.choices) { if (!c.text) { showToast('選択肢が未入力のものがあります','error'); return false; } }
  }
  return true;
}

// ===== Download HTML =====
function doDownload() {
  saveCurrentStep();
  if (!validateAll()) return;
  const html = generateHTML(data);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (data.title || 'shindan') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('HTMLファイルをダウンロードしました','success');
}

function generateHTML(d) {
  const t = THEMES[d.theme] || THEMES.pink;
  const isDark = d.bgStyle === 'dark';
  const bg = isDark ? t.bgDark : t.bg;
  const txt = isDark ? t.textDark : t.text;
  const borderCol = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
  const cardBg = isDark ? 'rgba(255,255,255,.05)' : '#ffffff';
  const optBg = isDark ? 'rgba(255,255,255,.03)' : bg;
  const optHover = isDark ? 'rgba(255,255,255,.08)' : '#fff';
  const subCol = isDark ? 'rgba(255,255,255,.5)' : 'rgba(0,0,0,.4)';

  const typesJSON = JSON.stringify(d.types);
  const questionsJSON = JSON.stringify(d.questions);

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<!-- Replace with your own GA4 ID -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"><\/script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');<\/script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(d.title)}</title>
<meta name="description" content="${esc(d.description)}">
<meta property="og:title" content="${esc(d.title)}">
<meta property="og:description" content="${esc(d.description)}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:${bg};color:${txt};min-height:100vh;line-height:1.9}
.container{max-width:560px;margin:0 auto;padding:20px 16px}
.serif{font-family:'Noto Serif JP',serif}
.start{text-align:center;padding:50px 0 30px}
.start-deco{color:${t.light};font-size:1.6rem;margin-bottom:16px;letter-spacing:8px}
.start h1{font-family:'Noto Serif JP',serif;font-size:1.5rem;font-weight:500;color:${txt};margin-bottom:8px;letter-spacing:.05em}
.start .sub{color:${subCol};font-size:.88rem;margin-bottom:28px}
.start-img{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid ${t.light}40;margin-bottom:24px;box-shadow:0 8px 32px ${t.primary}20}
.feats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.feat{padding:6px 16px;background:${cardBg};border-radius:20px;font-size:.76rem;color:${subCol};border:1px solid ${borderCol};box-shadow:0 1px 4px rgba(0,0,0,.03)}
.btn-start{padding:16px 52px;background:linear-gradient(135deg,${t.light},${t.primary});color:#fff;border:none;border-radius:40px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px ${t.primary}40;transition:all .25s;letter-spacing:.06em}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px ${t.primary}50}
.progress{margin:16px 0 8px}
.pbar{width:100%;height:4px;background:${borderCol};border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,${t.light},${t.primary});border-radius:2px;transition:width .4s ease}
.ptext{text-align:center;font-size:.72rem;color:${subCol};margin-top:6px}
.qcard{background:${cardBg};border:1px solid ${borderCol};border-radius:20px;padding:32px 24px;margin:16px 0;box-shadow:0 2px 16px rgba(0,0,0,.04);animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.qnum{font-family:'Noto Serif JP',serif;font-size:.78rem;color:${t.primary};font-weight:500;margin-bottom:6px}
.qtxt{font-size:1.05rem;font-weight:500;color:${txt};margin-bottom:22px;line-height:1.7}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:14px 18px;background:${optBg};border:1.5px solid ${borderCol};border-radius:14px;cursor:pointer;font-size:.9rem;color:${txt};transition:all .2s}
.opt:hover{border-color:${t.primary};background:${optHover}}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:${t.primary};background:${t.primary}18;color:${t.primary}}
.result{text-align:center;padding:20px 0;animation:fadeUp .5s ease}
.r-label{font-family:'Noto Serif JP',serif;font-size:.85rem;color:${subCol};margin-bottom:16px;letter-spacing:.1em}
.r-img-wrap{position:relative;display:inline-block;margin-bottom:20px}
.r-img-bg{width:220px;height:220px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.15}
.r-img{width:200px;height:200px;border-radius:50%;object-fit:cover;border:4px solid ${cardBg};box-shadow:0 8px 40px rgba(0,0,0,.1);position:relative;z-index:1}
.r-no-img{width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:4rem;border:4px solid ${cardBg};box-shadow:0 8px 40px rgba(0,0,0,.1);position:relative;z-index:1}
.r-name{font-family:'Noto Serif JP',serif;font-size:1.6rem;font-weight:700;margin-bottom:4px;letter-spacing:.04em}
.r-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0 24px}
.r-tag{padding:5px 16px;border-radius:20px;font-size:.76rem;font-weight:500;border:1.5px solid;background:${cardBg}}
.r-card{background:${cardBg};border:1px solid ${borderCol};border-radius:18px;padding:24px;margin-bottom:16px;text-align:left;box-shadow:0 2px 12px rgba(0,0,0,.03)}
.r-card-title{font-family:'Noto Serif JP',serif;font-size:.88rem;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.r-card p{font-size:.85rem;color:${subCol};line-height:2}
.share{display:flex;gap:10px;justify-content:center;margin:20px 0}
.share-btn{padding:10px 24px;border-radius:24px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.share-btn.line{background:#06c755;color:#fff}
.share-btn.x{background:#333;color:#fff}
.share-btn:hover{opacity:.85;transform:translateY(-1px)}
.footer{text-align:center;padding:32px 16px;font-size:.72rem;color:${subCol}}
@media(max-width:420px){.start h1{font-size:1.3rem}.r-name{font-size:1.35rem}.r-img,.r-no-img{width:170px;height:170px}.r-img-bg{width:190px;height:190px}}
</style>
</head>
<body>
<div class="container">
<div id="screen-start">
<div class="start">
<div class="start-deco">&#10022; &#10022; &#10022;</div>
<h1 class="serif">${esc(d.title)}</h1>
<p class="sub">${esc(d.description)}</p>
<div class="feats">
<span class="feat">&#x1F193; 完全無料</span>
<span class="feat">&#x23F1; 約${d.questions.length > 5 ? '3' : '2'}分</span>
<span class="feat">&#x1F3AF; ${d.types.length}タイプ</span>
</div>
<button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
</div>
</div>
<div id="screen-quiz" style="display:none">
<div class="progress"><div class="pbar"><div class="pfill" id="progress" style="width:0%"></div></div><div class="ptext" id="ptext"></div></div>
<div id="qarea"></div>
</div>
<div id="screen-result" style="display:none"></div>
<div class="footer">&copy; 2026 ShindanMaker</div>
</div>
<script>
const TYPES=${typesJSON};
const QS=${questionsJSON};
let cur=0,sc=new Array(TYPES.length).fill(0);
function startQuiz(){document.getElementById('screen-start').style.display='none';document.getElementById('screen-quiz').style.display='block';showQ();}
function showQ(){const q=QS[cur];document.getElementById('progress').style.width=(cur/QS.length*100)+'%';document.getElementById('ptext').textContent=(cur+1)+' / '+QS.length;let h='<div class="qcard"><div class="qnum">Q'+(cur+1)+'</div><div class="qtxt">'+q.text+'</div><div class="opts">';q.choices.forEach(function(c,i){h+='<div class="opt" onclick="pick('+i+')">'+c.text+'</div>';});h+='</div></div>';document.getElementById('qarea').innerHTML=h;}
function pick(i){var q=QS[cur];var ti=q.choices[i].typeIndex;if(ti>=0&&ti<sc.length)sc[ti]++;document.querySelectorAll('.opt')[i].classList.add('sel');setTimeout(function(){cur++;if(cur<QS.length)showQ();else showResult();},280);}
function showResult(){document.getElementById('screen-quiz').style.display='none';document.getElementById('screen-result').style.display='block';var mx=0,mi=0;sc.forEach(function(v,i){if(v>mx){mx=v;mi=i}});var r=TYPES[mi];var tags=(r.tags||'').split(',').filter(Boolean).map(function(t){return '<span class="r-tag" style="color:${t.primary};border-color:${t.primary}30">'+t.trim()+'</span>';}).join('');
var imgH=r.image?'<div class="r-img-wrap"><div class="r-img-bg" style="background:${t.primary}"></div><img class="r-img" src="'+r.image+'" alt="'+r.name+'"></div>':'<div class="r-img-wrap"><div class="r-img-bg" style="background:${t.primary}"></div><div class="r-no-img" style="background:${t.primary}18">&#x2728;</div></div>';
var url=encodeURIComponent(location.href);var txt=encodeURIComponent(r.name+'\\u3060\\u3063\\u305F\\uFF01 \\u3042\\u306A\\u305F\\u3082\\u3084\\u3063\\u3066\\u307F\\u3066\\u{1F447}');
document.getElementById('screen-result').innerHTML='<div class="result"><div class="r-label serif">\\u3042\\u306a\\u305f\\u306e\\u7d50\\u679c\\u306f</div>'+imgH+'<div class="r-name serif" style="color:${t.primary}">'+r.name+'</div><div class="r-tags">'+tags+'</div>'+(r.description?'<div class="r-card"><div class="r-card-title">\\ud83d\\udccb \\u8a73\\u7d30</div><p>'+r.description+'</p></div>':'')+'<div class="share"><button class="share-btn line" onclick="window.open(\\'https://social-plugins.line.me/lineit/share?url='+url+'&text='+txt+'\\',\\'_blank\\')">LINE\\u3067\\u5171\\u6709</button><button class="share-btn x" onclick="window.open(\\'https://twitter.com/intent/tweet?text='+txt+'&url='+url+'\\',\\'_blank\\')">X\\u3067\\u5171\\u6709</button></div></div>';window.scrollTo({top:0,behavior:'smooth'});}
<\/script>
</body>
</html>`;
}

// ===== Toast =====
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
init();
</script>
</body>
</html>

.q-number{font-size:.78rem;color:var(--accent2);font-weight:700;margin-bottom:10px;letter-spacing:.08em}
.q-text{font-size:1.15rem;font-weight:600;margin-bottom:28px;line-height:1.7}
.options{display:flex;flex-direction:column;gap:10px}
.option{padding:16px 20px;background:var(--surface2);border:2px solid rgba(155,125,255,.08);border-radius:var(--radius-sm);cursor:pointer;font-size:.95rem;color:var(--text);transition:all .25s cubic-bezier(.4,0,.2,1);text-align:left;position:relative;overflow:hidden}

.cross-link-card{display:block;margin:24px 0;padding:20px 24px;background:var(--surface);border:1px solid rgba(155,125,255,.15);border-radius:var(--radius);text-decoration:none;color:var(--text);transition:all .3s;text-align:center}

let current=0, scores=new Array(8).fill(0);

function startQuiz(){
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  gtag('event','quiz_start',{quiz_type:'zense'});
  showQuestion();
}

function showQuestion(){
  const q=questions[current];
  const pct=((current)/10*100);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress-text').textContent=(current+1)+' / 10';
  const area=document.getElementById('question-area');
  const html='<div class="question-card fade-in"><div class="q-number">Q'+(current+1)+'</div><div class="q-text">'+q.q+'</div><div class="options">'+
    q.opts.map((o,i)=>'<div class="option" onclick="selectOption('+i+')">'+o+'</div>').join('')+
    '</div></div>';
  area.innerHTML=html;
}

function selectOption(idx){
  const opts=document.querySelectorAll('.option');
  opts[idx].classList.add('selected');
  const s=questions[current].scores[idx];
  for(let i=0;i<8;i++) scores[i]+=s[i];
  setTimeout(()=>{
    const card=document.querySelector('.question-card');
    if(card) card.classList.replace('fade-in','fade-out');
    setTimeout(()=>{
      current++;
      if(current<10){showQuestion();}
      else{showResult();}
    },250);
  },300);
}

/* Utility: hex color to rgba */
function hexToRgba(hex, alpha){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* Utility: lighten a hex color */
function lightenHex(hex, pct){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255, r+Math.round((255-r)*pct/100));
  g=Math.min(255, g+Math.round((255-g)*pct/100));
  b=Math.min(255, b+Math.round((255-b)*pct/100));
  return `rgb(${r},${g},${b})`;
}
